# Firebase App Hosting — backend runtime config
# https://firebase.google.com/docs/app-hosting/configure
#
# These env vars are read by the server (src/lib/firebase.ts + src/lib/email.ts).
# FIREBASE_PROJECT_ID is REQUIRED — without it the app runs in "placeholder
# mode" and silently drops form submissions instead of saving them to Firestore.

runConfig:
  # Cap scaling — this is a low-traffic marketing site; keeps cost predictable.
  maxInstances: 2

env:
  - variable: FIREBASE_PROJECT_ID
    value: lili-md-website
    availability:
      - RUNTIME
  - variable: GOOGLE_CLOUD_PROJECT
    value: lili-md-website
    availability:
      - RUNTIME
  - variable: NOTIFY_EMAIL
    value: admin@lilisolutions.ai
    availability:
      - RUNTIME
  - variable: SMTP_HOST
    value: smtp.gmail.com
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    value: "465"
    availability:
      - RUNTIME

  # --- Email sending: form notifications -> admin@lilisolutions.ai (NOTIFY_EMAIL) ---
  # Sends from nirali@lilisolutions.ai via Gmail SMTP + an App Password.
  # The App Password is a Secret Manager secret (never plaintext here).
  - variable: SMTP_USER
    value: nirali@lilisolutions.ai
    availability:
      - RUNTIME
  - variable: SMTP_PASS
    secret: SMTP_PASS
    availability:
      - RUNTIME

  # --- Access gate (ON — site is invitation-only) ---
  # See ACCESS_GATE.md. To make the site public again, set ENABLED to "false"
  # (or remove these two entries) and redeploy.
  - variable: ACCESS_GATE_ENABLED
    value: "true"
    availability:
      - RUNTIME
  - variable: ACCESS_SESSION_SECRET
    secret: ACCESS_SESSION_SECRET
    availability:
      - RUNTIME
  # --- Admin tool (/admin) password ---
  - variable: ADMIN_SECRET
    secret: ADMIN_SECRET
    availability:
      - RUNTIME
